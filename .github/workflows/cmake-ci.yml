name: CMake CI Build

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            cmake-preset: default
            artifact-suffix: linux-amd64
          - os: windows-latest
            cmake-preset: windows-msvc-release
            artifact-suffix: windows-amd64
          - os: macos-latest
            cmake-preset: macos-release
            artifact-suffix: macos-universal

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up CMake
      uses: lukka/get-cmake@latest

    - name: Set up MSVC (Windows)
      if: runner.os == 'Windows'
      uses: microsoft/setup-msbuild@v1.1

    - name: Create build directory
      run: cmake -E make_directory ${{ runner.workspace }}/build

    - name: Configure CMake (Linux)
      if: runner.os == 'Linux'
      shell: bash
      working-directory: ${{ runner.workspace }}/build
      run: |
        cmake -DCMAKE_BUILD_TYPE=Release \
               -DCMAKE_INSTALL_PREFIX=${{ runner.workspace }}/install \
               ${{ github.workspace }}

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      shell: bash
      working-directory: ${{ runner.workspace }}/build
      run: |
        cmake -G "Visual Studio 17 2022" \
               -A x64 \
               -DCMAKE_INSTALL_PREFIX="${{ runner.workspace }}/install" \
               ${{ github.workspace }}

    - name: Configure CMake (macOS)
      if: runner.os == 'macOS'
      shell: bash
      working-directory: ${{ runner.workspace }}/build
      run: |
        cmake -DCMAKE_BUILD_TYPE=Release \
               -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
               -DCMAKE_INSTALL_PREFIX=${{ runner.workspace }}/install \
               ${{ github.workspace }}

    - name: Build (Linux)
      if: runner.os == 'Linux'
      shell: bash
      working-directory: ${{ runner.workspace }}/build
      run: cmake --build . --config Release --parallel $(nproc)

    - name: Build (Windows)
      if: runner.os == 'Windows'
      shell: bash
      working-directory: ${{ runner.workspace }}/build
      run: cmake --build . --config Release --parallel 4

    - name: Build (macOS)
      if: runner.os == 'macOS'
      shell: bash
      working-directory: ${{ runner.workspace }}/build
      run: cmake --build . --config Release --parallel $(sysctl -n hw.ncpu)

    - name: Install
      working-directory: ${{ runner.workspace }}/build
      shell: bash
      run: cmake --install . --config Release

    - name: Collect Linux artifacts
      if: runner.os == 'Linux'
      shell: bash
      run: |
        mkdir -p artifacts
        cp ${{ runner.workspace }}/build/lib/libvscpl1drv-can232.so* artifacts/ || true
        cp ${{ runner.workspace }}/build/lib/libvscpl1drv-can232.a artifacts/ || true
        ls -la artifacts/

    - name: Collect Windows artifacts
      if: runner.os == 'Windows'
      shell: bash
      run: |
        mkdir -p artifacts
        find ${{ runner.workspace }}/build -name "*.dll" -o -name "*.lib" -o -name "*.pdb" | xargs -I {} cp {} artifacts/ || true
        ls -la artifacts/

    - name: Collect macOS artifacts
      if: runner.os == 'macOS'
      shell: bash
      run: |
        mkdir -p artifacts
        cp ${{ runner.workspace }}/build/lib/libvscpl1drv-can232.dylib* artifacts/ || true
        cp ${{ runner.workspace }}/build/lib/libvscpl1drv-can232.a artifacts/ || true
        ls -la artifacts/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vscpl1drv-can232-${{ matrix.artifact-suffix }}
        path: artifacts/
        retention-days: 30

    - name: Create release artifacts archive (Linux)
      if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        cd artifacts
        tar -czf ../vscpl1drv-can232-${{ matrix.artifact-suffix }}.tar.gz *
        md5sum ../vscpl1drv-can232-${{ matrix.artifact-suffix }}.tar.gz > ../vscpl1drv-can232-${{ matrix.artifact-suffix }}.tar.gz.md5
        cd ..

    - name: Create release artifacts archive (Windows)
      if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        cd artifacts
        7z a ../vscpl1drv-can232-${{ matrix.artifact-suffix }}.zip *
        cd ..

    - name: Create release artifacts archive (macOS)
      if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        cd build
        cpack -G DragDrop
        cpack -G TGZ
        cd ..
        mv build/vscpl1drv-can232-*.dmg . 2>/dev/null || true
        mv build/vscpl1drv-can232-*.tar.gz . 2>/dev/null || true

    - name: Generate checksums
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "Linux" ]; then
          md5sum vscpl1drv-can232-${{ matrix.artifact-suffix }}.tar.gz > CHECKSUMS.md5
          sha256sum vscpl1drv-can232-${{ matrix.artifact-suffix }}.tar.gz > CHECKSUMS.sha256
        elif [ "${{ runner.os }}" = "macOS" ]; then
          md5 -r vscpl1drv-can232-${{ matrix.artifact-suffix }}.tar.gz > CHECKSUMS.md5
          shasum -a 256 vscpl1drv-can232-${{ matrix.artifact-suffix }}.tar.gz > CHECKSUMS.sha256
          md5 -r vscpl1drv-can232-${{ matrix.artifact-suffix }}.dmg >> CHECKSUMS.md5 2>/dev/null || true
          shasum -a 256 vscpl1drv-can232-${{ matrix.artifact-suffix }}.dmg >> CHECKSUMS.sha256 2>/dev/null || true
        else
          certutil -hashfile vscpl1drv-can232-${{ matrix.artifact-suffix }}.zip MD5 > CHECKSUMS.md5
          certutil -hashfile vscpl1drv-can232-${{ matrix.artifact-suffix }}.zip SHA256 > CHECKSUMS.sha256
        fi

    - name: Upload Release Assets
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          vscpl1drv-can232-${{ matrix.artifact-suffix }}.tar.gz
          vscpl1drv-can232-${{ matrix.artifact-suffix }}.tar.gz.md5
          vscpl1drv-can232-${{ matrix.artifact-suffix }}.zip
          vscpl1drv-can232-${{ matrix.artifact-suffix }}.dmg
          CHECKSUMS.md5
          CHECKSUMS.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Display build summary
      if: always()
      shell: bash
      run: |
        echo "Build Summary for ${{ matrix.os }}"
        echo "=================================="
        echo "Workspace: ${{ runner.workspace }}"
        echo "Build directory: ${{ runner.workspace }}/build"
        echo "Install directory: ${{ runner.workspace }}/install"
        if [ -d artifacts ]; then
          echo "Artifacts:"
          ls -lh artifacts/
        fi
